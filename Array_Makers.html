<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var number=[10, 20, 30, 40, 50]
        document.write("The numbers are:",numbers)
        document.write("<br>")
        console.log("The numbers are:",numbers)
        numbers.push(50)
        document.write("The numbers after push are:",numbers)
        document.write("<br")
        console.log("The numbers after pop are:",numbers)
        numbers.pop()
        document.write("The numbers after pop are:",numbers)
        document.write("<br>")
        console.log("The number after pop are:",numbers)
        numbers.unshift(5)
        document.write("The numbers after unshift are:",numbers)
        document.write("<br>")
        console.log("The numbers after unshift are:",numbers)
        numbers.shift()
        document.write("The numbers after shift are:",numbers)
        document.write("<br>")
        console.log("The numbers after shift are:",numbers)
        document.write("The length of the number array is:",numbers.length)
        document.write("<br>")
        document.write("The index of 30 is:",numbers.indexOf(70))
        document.write("<br>")
        numbers[4]="Hari"
        document.write("The numbers after replacing are:",numbers)
        
    </script>
</body>
</html>
