<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divide Example</title>
</head>
<body>
    <script>
        try {
            var a = 5;
            var b = 0;

            if (b == 0) {
                throw "Cannot divide by zero";
            }

            var result = a / b;
            document.write("Result: " + result);

        } catch (e) {
            console.log("Error:", e);
            document.write("Error: " + e);
        } finally {
            console.log("Operation attempted");
            document.write("<br>Operation attempted");
        }
    </script>
</body>
</html>
